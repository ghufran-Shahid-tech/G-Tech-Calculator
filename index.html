<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Tech</title>

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo-icon.png">
    <link rel="apple-touch-icon" href="assets/images/logo-icon.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com" defer></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'pop': 'pop 0.1s ease-out',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        pop: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(0.95)' },
                            '100%': { transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        /* Glass Effect */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Button Press */
        .btn-press:active {
            transform: scale(0.92);
            transition: transform 0.05s;
        }

        /* Glow */
        .display-glow {
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>

<body class="bg-slate-900 text-gray-100 transition-colors duration-500 min-h-screen flex flex-col relative">

    <!-- Background -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500/20 rounded-full blur-[100px] animate-pulse-slow"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/20 rounded-full blur-[100px] animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    </div>

    <!-- Header -->
    <header class="w-full p-4 flex justify-between items-center z-20">
        <h1 class="font-bold text-xl tracking-tight text-white">G-Tech</h1>
    </header>

    <!-- Main -->
    <main class="flex-grow flex items-center justify-center p-4 relative z-10">

        <div class="glass rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col transition-all duration-300 hover:scale-[1.01]">

            <!-- Display -->
            <div class="bg-slate-800/50 p-6 flex flex-col items-end justify-end h-40 border-b border-slate-700">
                <div id="previous-operand" class="text-gray-400 text-sm font-mono h-6 text-right w-full"></div>
                <div id="current-operand" class="text-4xl font-bold font-mono display-glow break-all text-right w-full">0</div>
            </div>

            <!-- Keypad -->
            <div class="p-4 bg-slate-900/80 grid grid-cols-4 gap-3">

                <button data-action="clear" class="btn-calc p-4 rounded-2xl bg-slate-700 text-gray-200 font-bold">AC</button>
                <button data-action="delete" class="btn-calc p-4 rounded-2xl bg-slate-700 text-gray-200 font-bold">DEL</button>
                <button data-action="op" data-val="%" class="btn-calc p-4 rounded-2xl bg-slate-700 text-gray-200 font-bold">%</button>
                <button data-action="op" data-val="/" class="btn-calc p-4 rounded-2xl bg-brand-900/30 text-brand-400 font-bold">÷</button>

                <button data-action="num" data-val="7" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">7</button>
                <button data-action="num" data-val="8" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">8</button>
                <button data-action="num" data-val="9" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">9</button>
                <button data-action="op" data-val="*" class="btn-calc p-4 rounded-2xl bg-brand-900/30 text-brand-400 font-bold">×</button>

                <button data-action="num" data-val="4" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">4</button>
                <button data-action="num" data-val="5" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">5</button>
                <button data-action="num" data-val="6" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">6</button>
                <button data-action="op" data-val="-" class="btn-calc p-4 rounded-2xl bg-brand-900/30 text-brand-400 font-bold">−</button>

                <button data-action="num" data-val="1" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">1</button>
                <button data-action="num" data-val="2" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">2</button>
                <button data-action="num" data-val="3" class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">3</button>
                <button data-action="op" data-val="+" class="btn-calc p-4 rounded-2xl bg-brand-900/30 text-brand-400 font-bold">+</button>

                <button data-action="num" data-val="0" class="col-span-2 btn-calc p-4 rounded-2xl bg-slate-800 text-white">0</button>
                <button data-action="num" data-val="." class="btn-calc p-4 rounded-2xl bg-slate-800 text-white">.</button>
                <button data-action="calculate" class="btn-calc p-4 rounded-2xl bg-brand-500 text-white font-bold">=</button>

            </div>
        </div>
    </main>

    <footer class="w-full py-4 text-center text-sm text-gray-400 bg-slate-900/50 border-t border-slate-800">
        Developed by 
        <a href="https://ghufran-shahid-tech.github.io/Personal-Portfolio-/" target="_blank" class="font-semibold text-brand-400 hover:underline">
            Ghufran Shahid
        </a>
    </footer>

</body>
</html>
