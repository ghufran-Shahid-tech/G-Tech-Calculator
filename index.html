<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Tech Calculator</title>
    <link rel="icon" type="images/png" sizes="16x16" href="images/favicon-16.png">
    <link rel="icon" type="images/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" type="images/png" sizes="48x48" href="images/favicon-48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-180.png">
    <link rel="shortcut icon" href="images/favicon-48.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'pop': 'pop 0.1s ease-out',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        pop: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(0.95)' },
                            '100%': { transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* ============================================
           CSS RESET & BASE STYLES
           ============================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        img, video {
            max-width: 100%;
            height: auto;
            display: block;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* ============================================
           FLUID TYPOGRAPHY SYSTEM
           ============================================ */
        .fluid-text-xs { font-size: clamp(0.625rem, 1.5vw, 0.75rem); }
        .fluid-text-sm { font-size: clamp(0.75rem, 1.8vw, 0.875rem); }
        .fluid-text-base { font-size: clamp(0.875rem, 2vw, 1rem); }
        .fluid-text-lg { font-size: clamp(1rem, 2.5vw, 1.125rem); }
        .fluid-text-xl { font-size: clamp(1.125rem, 3vw, 1.25rem); }
        .fluid-text-2xl { font-size: clamp(1.25rem, 4vw, 1.5rem); }
        .fluid-text-3xl { font-size: clamp(1.5rem, 5vw, 1.875rem); }
        .fluid-text-4xl { font-size: clamp(1.875rem, 6vw, 2.25rem); }
        .fluid-text-5xl { font-size: clamp(2rem, 8vw, 3rem); }

        /* ============================================
           FLUID SPACING SYSTEM
           ============================================ */
        .fluid-p-1 { padding: clamp(0.25rem, 1vw, 0.5rem); }
        .fluid-p-2 { padding: clamp(0.5rem, 2vw, 0.75rem); }
        .fluid-p-3 { padding: clamp(0.75rem, 2.5vw, 1rem); }
        .fluid-p-4 { padding: clamp(1rem, 3vw, 1.5rem); }
        .fluid-p-6 { padding: clamp(1.5rem, 4vw, 2rem); }

        .fluid-gap-1 { gap: clamp(0.25rem, 1vw, 0.5rem); }
        .fluid-gap-2 { gap: clamp(0.5rem, 1.5vw, 0.75rem); }
        .fluid-gap-3 { gap: clamp(0.75rem, 2vw, 1rem); }
        .fluid-gap-4 { gap: clamp(1rem, 2.5vw, 1.5rem); }

        /* ============================================
           CONTAINER SYSTEM
           ============================================ */
        .container-fluid {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: clamp(12px, 4vw, 48px);
            padding-right: clamp(12px, 4vw, 48px);
        }

        /* ============================================
           CUSTOM SCROLLBAR
           ============================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* ============================================
           GLASSMORPHISM UTILITIES
           ============================================ */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-strong {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* ============================================
           BUTTON & INTERACTIVE ELEMENTS
           ============================================ */
        .btn-press {
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-press:active {
            transform: scale(0.92);
            transition: transform 0.05s;
        }

        /* Touch-friendly minimum size */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }

        /* ============================================
           DISPLAY GLOW EFFECT
           ============================================ */
        .display-glow {
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* ============================================
           CALCULATOR GRID SYSTEM
           ============================================ */
        .calculator-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(0.5rem, 2vw, 0.75rem);
        }

        .scientific-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(0.375rem, 1.5vw, 0.5rem);
        }

        /* ============================================
           RESPONSIVE LAYOUT ARCHITECTURE
           Mobile First Approach
           ============================================ */

        /* Base Mobile Styles (320px - 480px) */
        .app-layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: clamp(0.5rem, 2vw, 1rem);
            gap: clamp(1rem, 3vw, 1.5rem);
        }

        .calculator-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
        }

        .display-screen {
            padding: clamp(1rem, 4vw, 1.5rem);
            min-height: clamp(100px, 25vw, 140px);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .display-current {
            font-size: clamp(1.75rem, 8vw, 2.5rem);
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
            text-align: right;
            line-height: 1.2;
        }

        .display-previous {
            font-size: clamp(0.75rem, 3vw, 0.875rem);
            font-family: 'JetBrains Mono', monospace;
            color: #94a3b8;
            min-height: 1.5rem;
        }

        .keypad-container {
            padding: clamp(0.75rem, 3vw, 1rem);
        }

        .calc-btn {
            padding: clamp(0.75rem, 3vw, 1rem);
            border-radius: clamp(0.75rem, 2vw, 1rem);
            font-weight: 600;
            font-size: clamp(1rem, 4vw, 1.25rem);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            touch-action: manipulation;
        }

        .calc-btn-sci {
            padding: clamp(0.5rem, 2vw, 0.75rem);
            font-size: clamp(0.75rem, 2.5vw, 0.875rem);
        }

        /* History Panel - Mobile Overlay */
        .history-panel-desktop {
            display: none;
        }

        .history-panel-mobile {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .history-panel-mobile.active {
            opacity: 1;
            visibility: visible;
        }

        .history-drawer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70vh;
            background: #1e293b;
            border-radius: 1.5rem 1.5rem 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .history-panel-mobile.active .history-drawer {
            transform: translateY(0);
        }

        .history-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        /* ============================================
           BREAKPOINT: Large Phones (481px - 600px)
           ============================================ */
        @media (min-width: 481px) {
            .display-current {
                font-size: clamp(2rem, 7vw, 2.5rem);
            }

            .calc-btn {
                padding: clamp(1rem, 3vw, 1.25rem);
                font-size: clamp(1.125rem, 3.5vw, 1.375rem);
            }
        }

        /* ============================================
           BREAKPOINT: Tablets (601px - 768px)
           ============================================ */
        @media (min-width: 601px) {
            .main-content {
                justify-content: center;
                padding: clamp(1rem, 4vw, 2rem);
            }

            .calculator-container {
                max-width: 480px;
                border-radius: 1.5rem;
            }

            .display-current {
                font-size: 2.5rem;
            }

            .calc-btn {
                padding: 1.25rem;
                font-size: 1.375rem;
            }

            .history-drawer {
                height: 60vh;
            }
        }

        /* ============================================
           BREAKPOINT: Small Laptops (769px - 1024px)
           ============================================ */
        @media (min-width: 769px) {
            .main-content {
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: clamp(1.5rem, 4vw, 2rem);
            }

            .calculator-container {
                max-width: 420px;
                flex-shrink: 0;
            }

            .history-panel-desktop {
                display: flex;
                flex-direction: column;
                width: clamp(280px, 30vw, 320px);
                height: clamp(500px, 70vh, 600px);
                border-radius: 1.5rem;
                padding: clamp(1rem, 2vw, 1.5rem);
            }

            .history-panel-mobile {
                display: none;
            }

            .display-current {
                font-size: 2.25rem;
            }
        }

        /* ============================================
           BREAKPOINT: Laptops (1025px - 1366px)
           ============================================ */
        @media (min-width: 1025px) {
            .calculator-container {
                max-width: 450px;
            }

            .history-panel-desktop {
                width: 320px;
                height: 580px;
            }

            .calc-btn {
                padding: 1.25rem;
                font-size: 1.25rem;
            }

            .calc-btn:hover {
                transform: translateY(-2px);
            }
        }

        /* ============================================
           BREAKPOINT: Desktops (1367px - 1920px+)
           ============================================ */
        @media (min-width: 1367px) {
            .main-content {
                gap: 3rem;
            }

            .calculator-container {
                max-width: 480px;
            }

            .history-panel-desktop {
                width: 360px;
                height: 640px;
            }

            .display-current {
                font-size: 2.75rem;
            }

            .calc-btn {
                padding: 1.5rem;
                font-size: 1.375rem;
            }
        }

        /* ============================================
           BREAKPOINT: Ultra-wide (1921px+)
           ============================================ */
        @media (min-width: 1921px) {
            .container-fluid {
                max-width: 1600px;
            }

            .calculator-container {
                max-width: 520px;
            }

            .history-panel-desktop {
                width: 400px;
                height: 700px;
            }
        }

        /* ============================================
           UTILITY CLASSES
           ============================================ */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Prevent text selection on buttons */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Focus visible for accessibility */
        .focus-visible:focus-visible {
            outline: 2px solid #0ea5e9;
            outline-offset: 2px;
        }
    </style>
<base target="_blank">
</head>
<body class="bg-slate-900 text-gray-100 transition-colors duration-500 min-h-screen app-layout relative">

    <!-- Background Decoration -->
    <div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500/20 rounded-full blur-[100px] animate-pulse-slow"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/20 rounded-full blur-[100px] animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    </div>

    <!-- Header -->
    <header class="w-full p-4 flex justify-between items-center z-20 glass-strong sticky top-0">
        <div class="flex items-center gap-2">
            <h1 class="font-bold text-xl tracking-tight text-white">G-Tech</h1>
        </div>

        <div class="flex items-center gap-4">
            <button id="toggle-history" class="touch-target p-2 rounded-full hover:bg-slate-800 transition-colors relative group focus-visible" aria-label="Toggle History">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="absolute top-12 right-0 bg-slate-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none hidden md:block">History</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content container-fluid">

        <!-- Calculator Container -->
        <div class="calculator-container glass rounded-3xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300 hover:shadow-brand-500/20">

            <!-- Display Screen -->
            <div class="display-screen bg-slate-800/50 border-b border-slate-700 relative">
                <div id="previous-operand" class="display-previous h-6 overflow-hidden whitespace-nowrap w-full text-right transition-all"></div>
                <div id="current-operand" class="display-current display-glow text-right w-full transition-all">0</div>

                <!-- Memory Indicator -->
                <div id="memory-indicator" class="absolute top-3 left-3 text-xs font-bold text-brand-500 opacity-0 transition-opacity">M</div>
            </div>

            <!-- Mode Toggles -->
            <div class="flex bg-slate-900/50 p-1 gap-1">
                <button id="mode-std" class="flex-1 py-2 text-xs font-bold uppercase tracking-wider rounded bg-slate-700 shadow-sm text-brand-400 transition-all touch-target focus-visible">Standard</button>
                <button id="mode-sci" class="flex-1 py-2 text-xs font-bold uppercase tracking-wider rounded text-gray-400 hover:bg-slate-800 transition-all touch-target focus-visible">Scientific</button>
            </div>

            <!-- Keypad -->
            <div class="keypad-container bg-slate-900/80">

                <!-- Scientific Keys (Hidden by default) -->
                <div id="sci-keys" class="scientific-grid mb-3 hidden animate-slide-up">
                    <button data-action="func" data-val="sin" class="calc-btn calc-btn-sci bg-indigo-900/30 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select">sin</button>
                    <button data-action="func" data-val="cos" class="calc-btn calc-btn-sci bg-indigo-900/30 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select">cos</button>
                    <button data-action="func" data-val="tan" class="calc-btn calc-btn-sci bg-indigo-900/30 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select">tan</button>
                    <button data-action="func" data-val="log" class="calc-btn calc-btn-sci bg-indigo-900/30 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select">log</button>
                    <button data-action="func" data-val="ln" class="calc-btn calc-btn-sci bg-indigo-900/30 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select">ln</button>

                    <button data-action="func" data-val="asin" class="calc-btn calc-btn-sci bg-indigo-900/20 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select text-xs">sin⁻¹</button>
                    <button data-action="func" data-val="acos" class="calc-btn calc-btn-sci bg-indigo-900/20 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select text-xs">cos⁻¹</button>
                    <button data-action="func" data-val="atan" class="calc-btn calc-btn-sci bg-indigo-900/20 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select text-xs">tan⁻¹</button>
                    <button data-action="op" data-val="^" class="calc-btn calc-btn-sci bg-indigo-900/20 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select">xʸ</button>
                    <button data-action="func" data-val="sqrt" class="calc-btn calc-btn-sci bg-indigo-900/20 text-indigo-300 hover:bg-indigo-900/50 btn-press focus-visible no-select">√</button>

                    <button data-action="func" data-val="pi" class="calc-btn calc-btn-sci bg-slate-800 text-gray-300 hover:bg-slate-700 btn-press focus-visible no-select">π</button>
                    <button data-action="func" data-val="e" class="calc-btn calc-btn-sci bg-slate-800 text-gray-300 hover:bg-slate-700 btn-press focus-visible no-select">e</button>
                    <button data-action="func" data-val="(" class="calc-btn calc-btn-sci bg-slate-800 text-gray-300 hover:bg-slate-700 btn-press focus-visible no-select">(</button>
                    <button data-action="func" data-val=")" class="calc-btn calc-btn-sci bg-slate-800 text-gray-300 hover:bg-slate-700 btn-press focus-visible no-select">)</button>
                    <button data-action="func" data-val="!" class="calc-btn calc-btn-sci bg-slate-800 text-gray-300 hover:bg-slate-700 btn-press focus-visible no-select">n!</button>
                </div>

                <!-- Standard Keys -->
                <div class="calculator-grid">
                    <!-- Row 1: Memory -->
                    <button data-action="memory" data-val="MC" class="calc-btn bg-red-900/20 text-red-500 hover:bg-red-900/40 btn-press focus-visible no-select touch-target">MC</button>
                    <button data-action="memory" data-val="MR" class="calc-btn bg-red-900/20 text-red-500 hover:bg-red-900/40 btn-press focus-visible no-select touch-target">MR</button>
                    <button data-action="memory" data-val="M+" class="calc-btn bg-red-900/20 text-red-500 hover:bg-red-900/40 btn-press focus-visible no-select touch-target">M+</button>
                    <button data-action="memory" data-val="M-" class="calc-btn bg-red-900/20 text-red-500 hover:bg-red-900/40 btn-press focus-visible no-select touch-target">M-</button>

                    <!-- Row 2: Clear/Delete/Percent/Divide -->
                    <button data-action="clear" class="calc-btn bg-slate-700 text-gray-200 font-bold text-lg hover:bg-slate-600 btn-press focus-visible no-select touch-target">AC</button>
                    <button data-action="delete" class="calc-btn bg-slate-700 text-gray-200 hover:bg-slate-600 btn-press focus-visible no-select touch-target" aria-label="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-6 md:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" />
                        </svg>
                    </button>
                    <button data-action="op" data-val="%" class="calc-btn bg-slate-700 text-gray-200 font-bold text-lg hover:bg-slate-600 btn-press focus-visible no-select touch-target">%</button>
                    <button data-action="op" data-val="/" class="calc-btn bg-brand-900/30 text-brand-400 font-bold text-xl hover:bg-brand-900/50 btn-press focus-visible no-select touch-target">÷</button>

                    <!-- Row 3: 7-9, Multiply -->
                    <button data-action="num" data-val="7" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">7</button>
                    <button data-action="num" data-val="8" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">8</button>
                    <button data-action="num" data-val="9" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">9</button>
                    <button data-action="op" data-val="*" class="calc-btn bg-brand-900/30 text-brand-400 font-bold text-xl hover:bg-brand-900/50 btn-press focus-visible no-select touch-target">×</button>

                    <!-- Row 4: 4-6, Subtract -->
                    <button data-action="num" data-val="4" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">4</button>
                    <button data-action="num" data-val="5" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">5</button>
                    <button data-action="num" data-val="6" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">6</button>
                    <button data-action="op" data-val="-" class="calc-btn bg-brand-900/30 text-brand-400 font-bold text-xl hover:bg-brand-900/50 btn-press focus-visible no-select touch-target">−</button>

                    <!-- Row 5: 1-3, Add -->
                    <button data-action="num" data-val="1" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">1</button>
                    <button data-action="num" data-val="2" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">2</button>
                    <button data-action="num" data-val="3" class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">3</button>
                    <button data-action="op" data-val="+" class="calc-btn bg-brand-900/30 text-brand-400 font-bold text-xl hover:bg-brand-900/50 btn-press focus-visible no-select touch-target">+</button>

                    <!-- Row 6: 0, Dot, Equals -->
                    <button data-action="num" data-val="0" class="col-span-2 calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">0</button>
                    <button data-action="num" data-val="." class="calc-btn bg-slate-800 text-white shadow-sm hover:bg-slate-700 btn-press focus-visible no-select touch-target">.</button>
                    <button data-action="calculate" class="calc-btn bg-brand-500 text-white font-bold text-xl shadow-lg shadow-brand-500/40 hover:bg-brand-600 hover:shadow-brand-500/60 btn-press focus-visible no-select touch-target">=</button>
                </div>
            </div>
        </div>

        <!-- History Panel (Desktop) -->
        <div id="history-panel-desktop" class="history-panel-desktop glass">
            <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                <h3 class="font-bold text-gray-400 uppercase text-xs tracking-wider">History</h3>
                <button id="clear-history" class="text-xs text-red-400 hover:text-red-500 font-semibold px-2 py-1 rounded hover:bg-red-900/20 transition-colors focus-visible">Clear</button>
            </div>
            <div id="history-list-desktop" class="flex-1 overflow-y-auto space-y-3 pr-1 no-scrollbar">
                <div class="text-center text-gray-400 text-sm mt-10 italic">No history yet</div>
            </div>
        </div>
    </main>

    <!-- Mobile History Overlay -->
    <div id="mobile-history-overlay" class="history-panel-mobile" aria-hidden="true">
        <div class="history-drawer">
            <div class="flex justify-between items-center p-4 border-b border-slate-700">
                <h3 class="font-bold text-lg">History</h3>
                <div class="flex items-center gap-3">
                    <button id="clear-history-mobile" class="text-xs text-red-400 hover:text-red-500 font-semibold px-3 py-1.5 rounded hover:bg-red-900/20 transition-colors focus-visible">Clear</button>
                    <button id="close-mobile-history" class="touch-target p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition-colors focus-visible" aria-label="Close history">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="history-list-mobile" class="history-content no-scrollbar">
                <div class="text-center text-gray-400 text-sm mt-10 italic">No history yet</div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full py-4 px-4 text-center text-sm text-gray-500 relative z-20 bg-slate-900/80 backdrop-blur-sm border-t border-slate-800">
        <p class="text-xs md:text-sm">Developed by <a href="https://ghufran-shahid-tech.github.io/Personal-Portfolio-/" target="_blank" rel="noopener noreferrer" class="font-semibold text-brand-400 hover:text-brand-300 hover:underline decoration-2 underline-offset-2 transition-all">Ghufran Shahid</a></p>
    </footer>

    <script>
        /**
         * Calculator Logic Module
         * Handles state, computation, and memory.
         */
        class Calculator {
            constructor(prevOperandTextElement, currentOperandTextElement) {
                this.prevOperandTextElement = prevOperandTextElement;
                this.currentOperandTextElement = currentOperandTextElement;
                this.memory = 0;
                this.history = [];
                this.clear();
            }

            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = undefined;
                this.shouldResetScreen = false;
            }

            delete() {
                if (this.shouldResetScreen) return;
                if (this.currentOperand === '0') return;
                if (this.currentOperand.length === 1) {
                    this.currentOperand = '0';
                } else {
                    this.currentOperand = this.currentOperand.toString().slice(0, -1);
                }
            }

            appendNumber(number) {
                if (this.shouldResetScreen) {
                    this.currentOperand = '';
                    this.shouldResetScreen = false;
                }
                if (number === '.' && this.currentOperand.includes('.')) return;
                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number.toString();
                } else {
                    this.currentOperand = this.currentOperand.toString() + number.toString();
                }
            }

            chooseOperation(operation) {
                if (this.currentOperand === '') return;
                if (this.previousOperand !== '') {
                    this.compute();
                }
                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '';
            }

            executeFunction(funcName) {
                let current = parseFloat(this.currentOperand);
                if (isNaN(current)) return;

                let result;
                let expression = `${funcName}(${this.currentOperand})`;

                try {
                    switch(funcName) {
                        case 'sin': result = Math.sin(current); break;
                        case 'cos': result = Math.cos(current); break;
                        case 'tan': result = Math.tan(current); break;
                        case 'asin': result = Math.asin(current); break;
                        case 'acos': result = Math.acos(current); break;
                        case 'atan': result = Math.atan(current); break;
                        case 'log': result = Math.log10(current); break;
                        case 'ln': result = Math.log(current); break;
                        case 'sqrt': result = Math.sqrt(current); break;
                        case 'pi': 
                            this.currentOperand = Math.PI.toString(); 
                            this.shouldResetScreen = true;
                            return;
                        case 'e': 
                            this.currentOperand = Math.E.toString(); 
                            this.shouldResetScreen = true;
                            return;
                        case '!':
                            if (current < 0 || !Number.isInteger(current)) throw new Error("Invalid Input");
                            result = 1;
                            for(let i=2; i<=current; i++) result *= i;
                            expression = `${this.currentOperand}!`;
                            break;
                        default: return;
                    }

                    if (isNaN(result) || !isFinite(result)) throw new Error("Error");

                    this.addToHistory(expression, result);
                    this.currentOperand = result;
                    this.shouldResetScreen = true;
                } catch (e) {
                    this.currentOperand = "Error";
                    this.shouldResetScreen = true;
                }
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                if (isNaN(prev) || isNaN(current)) return;

                let expression = `${prev} ${this.operation} ${current}`;

                switch (this.operation) {
                    case '+': computation = prev + current; break;
                    case '-': computation = prev - current; break;
                    case '*': computation = prev * current; break;
                    case '/': 
                        if(current === 0) {
                            this.currentOperand = "Can't divide by 0";
                            this.previousOperand = '';
                            this.operation = undefined;
                            this.shouldResetScreen = true;
                            return;
                        }
                        computation = prev / current; 
                        break;
                    case '^': computation = Math.pow(prev, current); break;
                    case '%': computation = prev % current; break;
                    default: return;
                }

                computation = Math.round(computation * 100000000) / 100000000;

                this.addToHistory(expression, computation);
                this.currentOperand = computation;
                this.operation = undefined;
                this.previousOperand = '';
                this.shouldResetScreen = true;
            }

            memoryOperation(type) {
                const current = parseFloat(this.currentOperand);
                switch(type) {
                    case 'MC': this.memory = 0; break;
                    case 'MR': 
                        this.currentOperand = this.memory.toString(); 
                        this.shouldResetScreen = true;
                        break;
                    case 'M+': 
                        if(!isNaN(current)) this.memory += current; 
                        break;
                    case 'M-': 
                        if(!isNaN(current)) this.memory -= current; 
                        break;
                    case 'MS': 
                        if(!isNaN(current)) this.memory = current; 
                        break;
                }
                updateMemoryIndicator();
            }

            getDisplayNumber(number) {
                if (number === "Error" || number === "Can't divide by 0") return number;
                const stringNumber = number.toString();
                const integerDigits = parseFloat(stringNumber.split('.')[0]);
                const decimalDigits = stringNumber.split('.')[1];
                let integerDisplay;
                if (isNaN(integerDigits)) {
                    integerDisplay = '';
                } else {
                    integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
                }
                if (decimalDigits != null) {
                    return `${integerDisplay}.${decimalDigits}`;
                } else {
                    return integerDisplay;
                }
            }

            updateDisplay() {
                this.currentOperandTextElement.innerText = this.getDisplayNumber(this.currentOperand);
                if (this.operation != null) {
                    this.prevOperandTextElement.innerText = `${this.getDisplayNumber(this.previousOperand)} ${this.operation}`;
                } else {
                    this.prevOperandTextElement.innerText = '';
                }
            }

            addToHistory(expr, res) {
                const entry = { expression: expr, result: res, time: new Date() };
                this.history.unshift(entry);
                if (this.history.length > 20) this.history.pop();
                renderHistory();
            }
        }

        /**
         * UI Controller & Event Listeners
         */
        const prevOperandTextElement = document.getElementById('previous-operand');
        const currentOperandTextElement = document.getElementById('current-operand');
        const calculator = new Calculator(prevOperandTextElement, currentOperandTextElement);

        // Mode Toggle
        const modeStd = document.getElementById('mode-std');
        const modeSci = document.getElementById('mode-sci');
        const sciKeys = document.getElementById('sci-keys');

        modeStd.addEventListener('click', () => {
            sciKeys.classList.add('hidden');
            modeStd.classList.add('bg-slate-700', 'shadow-sm', 'text-brand-400');
            modeStd.classList.remove('text-gray-400');
            modeSci.classList.remove('bg-slate-700', 'shadow-sm', 'text-brand-400');
            modeSci.classList.add('text-gray-400');
        });

        modeSci.addEventListener('click', () => {
            sciKeys.classList.remove('hidden');
            modeSci.classList.add('bg-slate-700', 'shadow-sm', 'text-brand-400');
            modeSci.classList.remove('text-gray-400');
            modeStd.classList.remove('bg-slate-700', 'shadow-sm', 'text-brand-400');
            modeStd.classList.add('text-gray-400');
        });

        // History Logic
        const historyListDesktop = document.getElementById('history-list-desktop');
        const historyListMobile = document.getElementById('history-list-mobile');
        const toggleHistoryBtn = document.getElementById('toggle-history');
        const mobileHistoryOverlay = document.getElementById('mobile-history-overlay');
        const closeMobileHistory = document.getElementById('close-mobile-history');
        const clearHistoryBtn = document.getElementById('clear-history');
        const clearHistoryMobileBtn = document.getElementById('clear-history-mobile');

        function generateHistoryHTML(item) {
            return `
                <div class="bg-slate-700/50 p-3 rounded-xl cursor-pointer hover:bg-slate-700 transition-all group" onclick="loadHistory('${item.result}')" role="button" tabindex="0">
                    <div class="text-xs text-gray-500 mb-1 font-mono">${item.expression} =</div>
                    <div class="text-lg font-bold text-brand-400 group-hover:translate-x-1 transition-transform">${item.result}</div>
                </div>
            `;
        }

        function renderHistory() {
            const emptyHTML = '<div class="text-center text-gray-400 text-sm mt-10 italic">No history yet</div>';

            if (calculator.history.length === 0) {
                historyListDesktop.innerHTML = emptyHTML;
                historyListMobile.innerHTML = emptyHTML;
            } else {
                const html = calculator.history.map(generateHistoryHTML).join('');
                historyListDesktop.innerHTML = html;
                historyListMobile.innerHTML = html;
            }
        }

        window.loadHistory = (val) => {
            calculator.currentOperand = val.toString();
            calculator.shouldResetScreen = true;
            calculator.updateDisplay();
            closeMobileHistoryPanel();
        };

        function clearHistory() {
            calculator.history = [];
            renderHistory();
        }

        clearHistoryBtn.addEventListener('click', clearHistory);
        clearHistoryMobileBtn.addEventListener('click', clearHistory);

        function openMobileHistoryPanel() {
            mobileHistoryOverlay.classList.add('active');
            mobileHistoryOverlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileHistoryPanel() {
            mobileHistoryOverlay.classList.remove('active');
            mobileHistoryOverlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        toggleHistoryBtn.addEventListener('click', () => {
            if (window.innerWidth < 769) {
                openMobileHistoryPanel();
            }
        });

        closeMobileHistory.addEventListener('click', closeMobileHistoryPanel);

        // Close on backdrop click
        mobileHistoryOverlay.addEventListener('click', (e) => {
            if (e.target === mobileHistoryOverlay) {
                closeMobileHistoryPanel();
            }
        });

        // Close on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && mobileHistoryOverlay.classList.contains('active')) {
                closeMobileHistoryPanel();
            }
        });

        // Memory Indicator
        const memIndicator = document.getElementById('memory-indicator');
        function updateMemoryIndicator() {
            memIndicator.style.opacity = calculator.memory !== 0 ? '1' : '0';
        }

        // Button Clicks with touch feedback
        document.querySelectorAll('.btn-calc').forEach(button => {
            // Touch feedback
            button.addEventListener('touchstart', () => {
                button.classList.add('scale-95');
            }, { passive: true });

            button.addEventListener('touchend', () => {
                button.classList.remove('scale-95');
            }, { passive: true });

            button.addEventListener('click', () => {
                const action = button.dataset.action;
                const val = button.dataset.val;

                // Visual feedback
                button.classList.add('animate-pop');
                setTimeout(() => button.classList.remove('animate-pop'), 100);

                if (action === 'num') calculator.appendNumber(val);
                if (action === 'op') calculator.chooseOperation(val);
                if (action === 'func') calculator.executeFunction(val);
                if (action === 'memory') calculator.memoryOperation(val);
                if (action === 'clear') calculator.clear();
                if (action === 'delete') calculator.delete();
                if (action === 'calculate') calculator.compute();

                calculator.updateDisplay();
            });
        });

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            let key = e.key;

            if (key === 'Enter') key = '=';
            if (key === 'Backspace') key = 'DEL';
            if (key === 'Escape') key = 'AC';
            if (key === '/') e.preventDefault();

            const button = Array.from(document.querySelectorAll('.btn-calc')).find(btn => {
                return btn.dataset.val === key || 
                       (key === '=' && btn.dataset.action === 'calculate') ||
                       (key === 'DEL' && btn.dataset.action === 'delete') ||
                       (key === 'AC' && btn.dataset.action === 'clear');
            });

            if (button) {
                button.click();
                button.classList.add('bg-slate-600');
                setTimeout(() => button.classList.remove('bg-slate-600'), 100);
            }
        });

        // Prevent zoom on double tap for iOS
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // Initialize
        calculator.updateDisplay();
    </script>
</body>
</html>
